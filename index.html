<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <script src="https://kit.fontawesome.com/5331c933bd.js" crossorigin="anonymous"></script>
    <title>Calculadora em Js</title>
</head>
<body>
    <main>
        <div class="content">
            <div class="area-text">
                <textarea readonly id="resultado"></textarea>
            </div>
            <button type="reset"  class="reset">C</button>
            <button id="divisao">/</button>
            <button id="multiplicacao">*</button>
            <button id="subtracao">-</button>
            <button id="soma">+</button>
            <button id="precedencia">( )</button>
            <button id="porcentagem">%</button>
            <button id="resultado-operacao">=</button>
            <button id="number-1">1</button>
            <button id="number-2">2</button>
            <button id="number-3">3</button>
            <button id="number-4">4</button>
            <button id="number-5">5</button>
            <button id="number-6">6</button>
            <button id="number-7">7</button>
            <button id="number-8">8</button>
            <button id="number-9">9</button>
            <button id="number-0">0</button>
            <button></button>
            <button></button>
        </div>
    </main>
</body>
</html>
